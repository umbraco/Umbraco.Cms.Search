name: $(TeamProject)_$(Build.DefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  batch: true
  branches:
    include:
      - main
  paths:
    include:
      - src
      - build
      - "*.props"
      - global.json
      - version.json

pr:
  branches:
    include:
      - main
      - release/*

parameters:
  - name: cache_nuget
    displayName: Cache NuGet packages
    type: boolean
    default: false

variables:
  solution: src/Umbraco.Cms.Search.sln
  buildConfiguration: Release
  DOTNET_NOLOGO: true
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  npm_config_cache: $(Pipeline.Workspace)/.npm_client

stages:
  - stage: Build
    variables:
      NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages
    jobs:
      - job: Build
        pool:
          vmImage: "ubuntu-latest"
        steps:
          # Checkout source (avoid shallow clone to calculate version height)
          - checkout: self
            fetchDepth: 0

          # Setup build environment
          - task: NuGetAuthenticate@1
            displayName: Authenticate NuGet

          - task: UseDotNet@2
            displayName: Use .NET SDK from global.json
            inputs:
              useGlobalJson: true

          - bash: |
              dotnet tool install --tool-path . nbgv
              ./nbgv cloud -a
            displayName: Set build version using nbgv
            workingDirectory: src

          # Client
          - task: NodeTool@0
            displayName: Use Node.js
            retryCountOnTaskFailure: 3
            inputs:
              versionSource: 'fromFile'
              versionFilePath: src/.nvmrc

          - task: Cache@2
            displayName: Cache node_modules
            inputs:
              key: '"npm_client" | "$(Agent.OS)"| $(Build.SourcesDirectory)/src/package-lock.json'
              restoreKeys: |
                "npm_client" | "$(Agent.OS)"
                "npm_client"
              path: $(npm_config_cache)

          - script: npm ci --no-fund --no-audit --prefer-offline
            displayName: Install NPM packages
            workingDirectory: src

          - script: npm run lint:errors-only
            displayName: Lint Client (errors only)
            workingDirectory: src

          - script: npm run build
            displayName: Build Client
            workingDirectory: src

          - bash: |
              mkdir -p $(Build.ArtifactStagingDirectory)/npm
              npm version $(NBGV_NpmPackageVersion) --allow-same-version --no-git-tag-version
              npm pack --pack-destination $(Build.ArtifactStagingDirectory)/npm
            displayName: Pack npm types package
            workingDirectory: src/Umbraco.Cms.Search.Core.Client/Client

          - task: PublishPipelineArtifact@1
            displayName: Publish npm types artifact
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/npm
              artifactName: npm-types

          # Cache and restore NuGet packages
          - task: Cache@2
            condition: ${{ parameters.cache_nuget }}
            displayName: Cache NuGet packages
            inputs:
              key: 'nuget | "$(Agent.OS)" | **/packages.lock.json, !**/bin/**, !**/obj/**'
              restoreKeys: |
                nuget | "$(Agent.OS)"
                nuget
              path: $(NUGET_PACKAGES)

          - script: dotnet restore $(solution) --locked-mode
            displayName: Restore NuGet packages

          # Build
          - script: dotnet build $(solution) --configuration $(buildConfiguration) --no-restore -p:ContinuousIntegrationBuild=true
            displayName: Run dotnet build

          # Pack
          - script: dotnet pack $(solution) --configuration $(buildConfiguration) --no-restore --output $(Build.ArtifactStagingDirectory)/nupkg
            displayName: Run dotnet pack

          # Publish
          - task: PublishPipelineArtifact@1
            displayName: Publish NuGet packages
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/nupkg
              artifactName: nupkg

          - task: PublishPipelineArtifact@1
            displayName: Publish build output
            inputs:
              targetPath: $(Build.SourcesDirectory)
              artifactName: build_output

  - stage: UnitTests
    displayName: Unit Tests
    dependsOn: Build
    jobs:
      - job: UnitTests
        displayName: Run Unit Tests
        pool:
          vmImage: 'windows-latest'
        steps:
          # Checkout source
          - checkout: self

          # Setup test environment
          - task: DownloadPipelineArtifact@2
            displayName: Download build artifacts
            inputs:
              artifact: build_output
              path: $(Build.SourcesDirectory)

          - task: UseDotNet@2
            displayName: Use .NET SDK from global.json
            inputs:
              useGlobalJson: true

          # Test
          - task: DotNetCoreCLI@2
            displayName: Run dotnet test
            inputs:
              command: test
              projects: "src/Umbraco.Test.Search.Unit/Umbraco.Test.Search.Unit.csproj"
              arguments: "--configuration $(buildConfiguration) --no-build"
              testRunTitle: Unit Tests - $(Agent.OS)

  - stage: IntegrationTests
    displayName: Integration Tests
    dependsOn: Build
    jobs:

      # Integration Tests (SQLite)
      - job: IntegrationTestsSQLite
        displayName: Run Integration Tests (SQLite)
        pool:
          vmImage: 'windows-latest'
        timeoutInMinutes: 60
        steps:
          - checkout: self
            submodules: false
            lfs: false
            fetchDepth: 1
            fetchFilter: tree:0

          # Setup test environment
          - task: DownloadPipelineArtifact@2
            displayName: Download build artifacts
            inputs:
              artifact: build_output
              path: $(Build.SourcesDirectory)

          - task: UseDotNet@2
            displayName: Use .NET SDK from global.json
            inputs:
              useGlobalJson: true

          # Test
          - task: DotNetCoreCLI@2
            displayName: Run Examine tests
            inputs:
              command: test
              projects: "src/Umbraco.Test.Search.Examine.Integration/Umbraco.Test.Search.Examine.Integration.csproj"
              arguments: '--configuration $(buildConfiguration) --no-build'
              testRunTitle: Examine Integration Tests SQLite - $(Agent.OS)
          - task: DotNetCoreCLI@2
            displayName: Run Core tests
            inputs:
              command: test
              projects: "src/Umbraco.Test.Search.Integration/Umbraco.Test.Search.Integration.csproj"
              arguments: '--configuration $(buildConfiguration) --no-build'
              testRunTitle: Integration Tests SQLite - $(Agent.OS)

      # Integration Tests (SQL Server)
      - job: IntegrationTestsSQLServer
        displayName: Run Integration Tests (SQL Server)
        pool:
          vmImage: 'windows-latest'
        timeoutInMinutes: 60
        steps:
          # Setup test environment
          - task: DownloadPipelineArtifact@2
            displayName: Download build artifacts
            inputs:
              artifact: build_output
              path: $(Build.SourcesDirectory)

          - task: UseDotNet@2
            displayName: Use .NET SDK from global.json
            inputs:
              useGlobalJson: true

          # Start SQL Server
          - powershell: docker run --name mssql -d -p 1433:1433 -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=$(SA_PASSWORD)" mcr.microsoft.com/mssql/server:2022-latest
            displayName: Start SQL Server Docker image (Linux)
            condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))

          - powershell: |
              $maxAttempts = 12
              $attempt = 0
              $status = ""

              while (($status -ne 'running') -and ($attempt -lt $maxAttempts)) {
                Start-Sleep -Seconds 5
                # We use the docker inspect command to check the status of the container. If the container is not running, we wait 5 seconds and try again. And if reaches 12 attempts, we fail the build.
                $status = docker inspect -f '{{.State.Status}}' mssql

                if ($status -ne 'running') {
                  Write-Host "Waiting for SQL Server to be ready... Attempt $($attempt + 1)"
                  $attempt++
                }
              }

              if ($status -eq 'running') {
                Write-Host "SQL Server container is running"
                docker ps -a
              } else {
                Write-Host "SQL Server did not become ready in time. Last known status: $status"
                docker logs mssql
                exit 1
              }
            displayName: Wait for SQL Server to be ready (Linux)
            condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))

          - pwsh: SqlLocalDB start MSSQLLocalDB
            displayName: Start SQL Server LocalDB (Windows)
            condition: and(succeeded(), eq(variables['Agent.OS'], 'Windows_NT'))

          # Test
          - task: DotNetCoreCLI@2
            displayName: Run Examine tests
            inputs:
              command: test
              projects: "src/Umbraco.Test.Search.Examine.Integration/Umbraco.Test.Search.Examine.Integration.csproj"
              arguments: '--configuration $(buildConfiguration) --no-build'
              testRunTitle: Examine Integration Tests SQL Server - $(Agent.OS)
          - task: DotNetCoreCLI@2
            displayName: Run Core tests
            inputs:
              command: test
              projects: "src/Umbraco.Test.Search.Integration/Umbraco.Test.Search.Integration.csproj"
              arguments: '--configuration $(buildConfiguration) --no-build'
              testRunTitle: Integration Tests SQL Server - $(Agent.OS)

          # Stop SQL Server
          - pwsh: docker stop mssql
            displayName: Stop SQL Server Docker image (Linux)
            condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))

          - pwsh: SqlLocalDB stop MSSQLLocalDB
            displayName: Stop SQL Server LocalDB (Windows)
            condition: and(succeeded(), eq(variables['Agent.OS'], 'Windows_NT'))

  - stage: E2E
    displayName: E2E Tests
    dependsOn: Build
    variables:
      npm_config_cache_e2e: $(Pipeline.Workspace)/.npm_e2e
      # Enable console logging in Release mode
      SERILOG__WRITETO__0__NAME: Async
      SERILOG__WRITETO__0__ARGS__CONFIGURE__0__NAME: Console
      # Set unattended install settings
      UMBRACO__CMS__UNATTENDED__INSTALLUNATTENDED: true
      UMBRACO__CMS__UNATTENDED__UNATTENDEDUSERNAME: Playwright Test
      UMBRACO__CMS__UNATTENDED__UNATTENDEDUSERPASSWORD: UmbracoAcceptance123!
      UMBRACO__CMS__UNATTENDED__UNATTENDEDUSEREMAIL: playwright@umbraco.com
      # Custom Umbraco settings
      UMBRACO__CMS__CONTENT__CONTENTVERSIONCLEANUPPOLICY__ENABLECLEANUP: false
      UMBRACO__CMS__GLOBAL__DISABLEELECTIONFORSINGLESERVER: true
      UMBRACO__CMS__GLOBAL__INSTALLMISSINGDATABASE: true
      UMBRACO__CMS__GLOBAL__ID: 00000000-0000-0000-0000-000000000042
      UMBRACO__CMS__GLOBAL__VERSIONCHECKPERIOD: 0
      UMBRACO__CMS__GLOBAL__USEHTTPS: true
      UMBRACO__CMS__HEALTHCHECKS__NOTIFICATION__ENABLED: false
      UMBRACO__CMS__KEEPALIVE__DISABLEKEEPALIVETASK: true
      UMBRACO__CMS__WEBROUTING__UMBRACOAPPLICATIONURL: https://localhost:44324/
      ASPNETCORE_URLS: https://localhost:44324
    jobs:
      - job:
        displayName: E2E Tests (SQLite)
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 30
        variables:
          CONNECTIONSTRINGS__UMBRACODBDSN: "Data Source=|DataDirectory|/Umbraco.sqlite.db;Cache=Shared;Foreign Keys=True;Pooling=True"
          CONNECTIONSTRINGS__UMBRACODBDSN_PROVIDERNAME: Microsoft.Data.Sqlite
        steps:
          # Checkout source (full clone for Nerdbank.GitVersioning)
          - checkout: self
            fetchDepth: 0

          # Setup environment
          - task: DownloadPipelineArtifact@2
            displayName: Download NuGet artifacts
            inputs:
              artifact: build_output
              path: $(Build.SourcesDirectory)

          - task: UseDotNet@2
            displayName: Use .NET SDK from global.json
            inputs:
              useGlobalJson: true

          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '22.x'

          - pwsh: |
              "UMBRACO_USER_LOGIN=$(UMBRACO__CMS__UNATTENDED__UNATTENDEDUSEREMAIL)
              UMBRACO_USER_PASSWORD=$(UMBRACO__CMS__UNATTENDED__UNATTENDEDUSERPASSWORD)
              URL=$(ASPNETCORE_URLS)" | Out-File .env
            displayName: Generate .env
            workingDirectory: $(Build.SourcesDirectory)/src/Umbraco.Test.Search.AcceptanceTest

          # Cache NPM packages
          - script: mkdir -p $(npm_config_cache_e2e)
            displayName: Create NPM cache directory

          - task: Cache@2
            displayName: Cache NPM packages
            inputs:
              key: '"npm_e2e" | "$(Agent.OS)" | src/Umbraco.Test.Search.AcceptanceTest/package-lock.json'
              restoreKeys: |
                "npm_e2e" | "$(Agent.OS)"
                "npm_e2e"
              path: $(npm_config_cache_e2e)

          # Restore NPM packages
          - script: npm ci --no-fund --no-audit --prefer-offline
            displayName: Restore NPM packages
            workingDirectory: src/Umbraco.Test.Search.AcceptanceTest

          # Generate HTTPS dev certificate
          - script: dotnet dev-certs https --trust
            displayName: Generate HTTPS dev certificate
            continueOnError: true

          # Run the built test site DLL via the shared dotnet host.
          # NB: launch the DLL (not `dotnet run`) because Pipeline artifacts do not preserve
          # the Unix executable bit, so the native apphost can't be exec'd ("Permission denied").
          # The dotnet host doesn't need +x on the apphost. workingDirectory sets the ContentRoot
          # so the Development uSync path "../_uSync/Shared/" resolves to src/_uSync/Shared/.
          - bash: |
              nohup dotnet bin/$(buildConfiguration)/net10.0/Umbraco.Web.TestSite.V17.dll > $(Build.ArtifactStagingDirectory)/testsite.log 2>&1 &
              echo "##vso[task.setvariable variable=AcceptanceTestProcessId]$!"
            displayName: Run application
            workingDirectory: src/Umbraco.Web.TestSite.V17
            env:
              ASPNETCORE_ENVIRONMENT: Development
              ASPNETCORE_URLS: $(ASPNETCORE_URLS)
              UMBRACO__CMS__UNATTENDED__INSTALLUNATTENDED: $(UMBRACO__CMS__UNATTENDED__INSTALLUNATTENDED)
              UMBRACO__CMS__UNATTENDED__UNATTENDEDUSERNAME: $(UMBRACO__CMS__UNATTENDED__UNATTENDEDUSERNAME)
              UMBRACO__CMS__UNATTENDED__UNATTENDEDUSERPASSWORD: $(UMBRACO__CMS__UNATTENDED__UNATTENDEDUSERPASSWORD)
              UMBRACO__CMS__UNATTENDED__UNATTENDEDUSEREMAIL: $(UMBRACO__CMS__UNATTENDED__UNATTENDEDUSEREMAIL)
              UMBRACO__CMS__GLOBAL__INSTALLMISSINGDATABASE: $(UMBRACO__CMS__GLOBAL__INSTALLMISSINGDATABASE)
              UMBRACO__CMS__GLOBAL__USEHTTPS: $(UMBRACO__CMS__GLOBAL__USEHTTPS)
              UMBRACO__CMS__GLOBAL__DISABLEELECTIONFORSINGLESERVER: $(UMBRACO__CMS__GLOBAL__DISABLEELECTIONFORSINGLESERVER)
              UMBRACO__CMS__GLOBAL__VERSIONCHECKPERIOD: $(UMBRACO__CMS__GLOBAL__VERSIONCHECKPERIOD)
              UMBRACO__CMS__CONTENT__CONTENTVERSIONCLEANUPPOLICY__ENABLECLEANUP: $(UMBRACO__CMS__CONTENT__CONTENTVERSIONCLEANUPPOLICY__ENABLECLEANUP)
              UMBRACO__CMS__HEALTHCHECKS__NOTIFICATION__ENABLED: $(UMBRACO__CMS__HEALTHCHECKS__NOTIFICATION__ENABLED)
              UMBRACO__CMS__KEEPALIVE__DISABLEKEEPALIVETASK: $(UMBRACO__CMS__KEEPALIVE__DISABLEKEEPALIVETASK)
              CONNECTIONSTRINGS__UMBRACODBDSN: $(CONNECTIONSTRINGS__UMBRACODBDSN)
              CONNECTIONSTRINGS__UMBRACODBDSN_PROVIDERNAME: $(CONNECTIONSTRINGS__UMBRACODBDSN_PROVIDERNAME)

          # DIAGNOSTIC: confirm the build output exists and the app survived startup; surface the log if it died
          - bash: |
              echo "=== Build output for test site ==="
              ls -la bin/Release/net10.0/Umbraco.Web.TestSite.V17.dll || echo "DLL NOT FOUND in bin/Release/net10.0"
              echo "=== Waiting 15s, then checking process $(AcceptanceTestProcessId) ==="
              sleep 15
              if kill -0 $(AcceptanceTestProcessId) 2>/dev/null; then
                echo "Test site process is alive."
              else
                echo "##[error]Test site process $(AcceptanceTestProcessId) is NOT running — it exited during startup."
                echo "=== testsite.log ==="
                cat $(Build.ArtifactStagingDirectory)/testsite.log || echo "(no testsite.log found)"
                exit 1
              fi
            displayName: Diagnose test site startup
            workingDirectory: src/Umbraco.Web.TestSite.V17

          # Wait for the application to respond (HTTP 200), bypassing the self-signed dev cert
          - script: npm install wait-on
            displayName: Install wait-on package
            workingDirectory: src/Umbraco.Test.Search.AcceptanceTest

          - bash: |
              set +e
              npx wait-on -v --interval 1000 --timeout 120000 https-get://localhost:44324
              code=$?
              if [ $code -ne 0 ]; then
                echo "##[error]Application did not respond within timeout. testsite.log:"
                cat $(Build.ArtifactStagingDirectory)/testsite.log || echo "(no testsite.log found)"
              fi
              exit $code
            displayName: Wait for application
            workingDirectory: src/Umbraco.Test.Search.AcceptanceTest
            env:
              NODE_TLS_REJECT_UNAUTHORIZED: 0

          # Install Playwright (Chromium) with OS dependencies
          - script: npx playwright install --with-deps chromium
            displayName: Install Playwright (Chromium)
            workingDirectory: src/Umbraco.Test.Search.AcceptanceTest

          # Run acceptance tests
          - script: npm run test
            displayName: Run Playwright tests
            workingDirectory: src/Umbraco.Test.Search.AcceptanceTest
            env:
              CI: true

          # Stop the application
          - bash: kill -15 $(AcceptanceTestProcessId)
            displayName: Stop application
            condition: and(succeededOrFailed(), ne(variables.AcceptanceTestProcessId, ''))

          # Publish test artifacts
          - task: PublishPipelineArtifact@1
            displayName: Publish test artifacts
            condition: succeededOrFailed()
            inputs:
              targetPath: src/Umbraco.Test.Search.AcceptanceTest/results
              artifactName: "Acceptance Test Results - $(Agent.JobName) - Attempt #$(System.JobAttempt)"

          # Publish test results
          - task: PublishTestResults@2
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'src/Umbraco.Test.Search.AcceptanceTest/results/results.xml'
              testRunTitle: 'Acceptance Test Results'
              failTaskOnFailedTests: true

  - stage: Dependency_Track
    displayName: Dependency Track
    dependsOn:
      - Build
      - IntegrationTests
    # Only upload the SBOM when it's from the main branch, as we don't need to for every PR.
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: sbom
        displayName: Upload SBOMs to DependencyTrack
        steps:
          - checkout: self
            fetchDepth: 0

          - task: PowerShell@2
            displayName: 'Read Version from version.json'
            inputs:
              targetType: 'inline'
              script: |
                $versionJson = Get-Content -Path "version.json" -Raw | ConvertFrom-Json
                $version = $versionJson.version
                Write-Host "Version from version.json: $version"
                Write-Host "##vso[task.setvariable variable=VersionNumber]$version"

          # NuGet SBOM
          - script: dotnet tool install --global CycloneDX
            displayName: 'Install CycloneDX .NET Tool'

          - script: dotnet CycloneDX --spec-version 1.5 $(solution)
            displayName: 'Generate NuGet SBOM'

          - publish: bom.xml
            artifact: sbom
            displayName: 'Publish NuGet SBOM Artifact'

          - task: upload-bom-dtrack@1
            displayName: 'Upload NuGet SBOM to Dependency-Track'
            inputs:
              bomFilePath: bom.xml
              dtrackProjName: $(Build.Repository.Name)
              dtrackProjVersion: $(VersionNumber)
              dtrackAPIKey: $(DT_API_KEY)
              dtrackURI: $(DT_API_URL)
              dtrackProjAutoCreate: true

          # NPM SBOM
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSource: 'fromFile'
              versionFilePath: src/.nvmrc

          - script: npx --yes @cyclonedx/cyclonedx-npm --package-lock-only --output-file $(Build.SourcesDirectory)/bom-npm.xml
            displayName: 'Generate NPM SBOM'
            workingDirectory: src

          - publish: bom-npm.xml
            artifact: sbom-npm
            displayName: 'Publish NPM SBOM Artifact'

          - task: upload-bom-dtrack@1
            displayName: 'Upload NPM SBOM to Dependency-Track'
            inputs:
              bomFilePath: bom-npm.xml
              dtrackProjName: $(Build.Repository.Name)-client
              dtrackProjVersion: $(VersionNumber)
              dtrackAPIKey: $(DT_API_KEY)
              dtrackURI: $(DT_API_URL)
              dtrackProjAutoCreate: true

